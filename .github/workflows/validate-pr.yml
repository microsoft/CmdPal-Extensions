name: Validate Extension Submission

on:
  pull_request:
    branches: [main]
    paths:
      - "extensions/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Validate extension submission
        id: validate
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- 'extensions/')
          if [ -n "$FILES" ]; then
            python .github/scripts/validate.py $FILES --summary validation-summary.md
          else
            echo "No extension files changed."
          fi

      - name: Comment on PR
        if: always() && steps.validate.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('validation-summary.md')) return;

            const summary = fs.readFileSync('validation-summary.md', 'utf8');
            const marker = '<!-- cmdpal-extension-validation -->';
            const body = marker + '\n' + summary;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if validation had errors
        if: steps.validate.outcome == 'failure'
        run: exit 1
