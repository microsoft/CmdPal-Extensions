name: Generate Extension Gallery

on:
  push:
    branches: [main]
    paths:
      - "extensions/**"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Generate extensions gallery
        run: python .github/scripts/generate.py

      - name: Commit and push if changed
        run: |
          git diff --quiet extensions.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extensions.json
          git commit -m "chore: regenerate extensions gallery [skip ci]"
          git push
